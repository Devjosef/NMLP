<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMPL Diagnostics Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0c0d12; color: #ced4da; padding: 20px; -webkit-font-smoothing: antialiased; }
        .workspace { display: grid; grid-template-columns: 1fr 420px; gap: 20px; max-width: 1440px; margin: 0 auto; }
        .left-panel { display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #11131c; padding: 12px 16px; border: 1px solid #1e2235; border-radius: 6px; }
        .system-title { display: flex; align-items: center; gap: 12px; }
        .brand { color: #00e5ff; font-weight: 700; font-family: monospace; letter-spacing: 1px; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; border: 1px solid transparent; }
        .status-pill.nominal { background: rgba(34, 197, 94, 0.1); color: #22c55e; border-color: rgba(34, 197, 94, 0.2); }
        .status-pill.degraded { background: rgba(217, 119, 6, 0.1); color: #fbbf24; border-color: rgba(217, 119, 6, 0.2); }
        .status-pill.failure { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
        .table-container { background: #11131c; border: 1px solid #1e2235; border-radius: 6px; overflow: hidden; }
        .table-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #1e2235; background: #151824; }
        .table-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #9aa2b1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid #161926; font-size: 13px; }
        th { background-color: #151824; color: #6c757d; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        tr.active-incident-row { background: rgba(239, 68, 68, 0.04); }
        tr.active-incident-row:hover { background: rgba(239, 68, 68, 0.08); }
        tr.normal-row:hover { background: #181b28; }
        .selected-timeline-row { background: rgba(0, 229, 255, 0.08) !important; box-shadow: inset 3px 0 0 0 #00e5ff; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; font-family: monospace; }
        .badge.ok { background-color: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
        .badge.alert { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; }
        .text-cyan { color: #00e5ff !important; }
        .text-red { color: #ef4444 !important; }
        .text-white { color: #ffffff !important; }
        .text-muted { color: #6c757d; }
        .mini-bar-wrapper { width: 60px; background: #1e2235; height: 6px; border-radius: 3px; display: inline-block; vertical-align: middle; overflow: hidden; margin-right: 8px; }
        .mini-bar-fill { height: 100%; border-radius: 3px; }
        .mini-bar-fill.ok { background: #22c55e; }
        .mini-bar-fill.alert { background: #ef4444; }
        .right-panel { background: #11131c; border: 1px solid #1e2235; border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 20px; height: fit-content; }
        .engine-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e2235; padding-bottom: 12px; }
        .engine-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #9aa2b1; display: flex; align-items: center; gap: 8px; }
        .engine-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: inline-block; }
        .incident-meta-box { background: #151824; border: 1px solid #1e2235; padding: 12px; border-radius: 4px; }
        .meta-tag { background: #d97706; color: #0c0d12; font-size: 10px; font-weight: 700; padding: 1px 4px; border-radius: 2px; margin-left: 8px; }
        .summary-block { font-size: 13px; line-height: 1.6; color: #a4b1cd; background: #151824; border-left: 3px solid #ef4444; padding: 12px; border-radius: 0 4px 4px 0; }
        .bottleneck-widget { display: grid; grid-template-columns: 80px 1fr 100px; border: 1px solid #1e2235; border-radius: 4px; background: #151824; overflow: hidden; }
        .b-cell { padding: 12px; display: flex; flex-direction: column; justify-content: center; }
        .b-cell:not(:last-child) { border-right: 1px solid #1e2235; }
        .b-label { font-size: 10px; text-transform: uppercase; color: #6c757d; font-weight: 600; margin-bottom: 4px; }
        .b-value { font-size: 18px; font-weight: 700; color: #ffffff; }
        .route-path-box { border: 1px solid #1e2235; border-radius: 4px; padding: 14px; background: #151824; }
        .node-track { display: flex; justify-content: space-between; align-items: center; position: relative; margin-top: 10px; gap: 10px; }
        .node-track::before { content: ''; position: absolute; left: 10px; right: 10px; top: 9px; height: 1px; background: #1e2235; z-index: 1; }
        .node-circle { width: 20px; height: 20px; border-radius: 4px; background: #11131c; border: 1px solid #22c55e; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; position: relative; z-index: 2; color: #22c55e; }
        .node-circle.alert { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .export-card { background: #151824; border: 1px solid #1e2235; padding: 16px; border-radius: 4px; display: flex; flex-direction: column; gap: 12px; }
        .btn-generate { background: #00e5ff; color: #0c0d12; width: 100%; padding: 10px; border: none; border-radius: 4px; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
        .btn-generate:hover { background: #00b2cc; }
        .btn-generate:disabled { background: #1e2235; color: #6c757d; cursor: not-allowed; }
        .control-toolbar input { background: transparent; color: #ffffff; border: none; font-family: inherit; font-size: 11px; font-weight: 600; outline: none; width: 140px; }
        .control-toolbar input::placeholder { color: #4b5563; }
        .target-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="workspace">
        <div class="left-panel">
            <header>
                <div class="system-title">
                    <span class="brand">((•)) NMPL</span>
                    <span class="text-muted" style="font-size: 11px;">v1.0.0</span>
                    <span class="status-pill nominal" id="global-status">● NOMINAL</span>
                </div>
                
                <div class="control-toolbar" style="display: flex; align-items: center; gap: 12px; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px;">
                    <div id="timestamp-target" style="color: #64748b;">
                        LIVE MATRIX TELEMETRY
                    </div>
                    
                    <div class="filter-box-wrapper" style="display: flex; align-items: center; background: #151824; border: 1px solid #1e2235; border-radius: 4px; padding: 6px 12px; color: #9aa2b1;">
                        <span style="color: #6c757d; margin-right: 6px;">TARGET:</span>
                        <input id="target-selector" 
                               type="text" 
                               name="target" 
                               placeholder="ENTER HOST OR IP..." 
                               hx-get="/partials/metrics" 
                               hx-target="#timeline-body" 
                               hx-swap="innerHTML"
                               hx-trigger="keyup[keyCode==13], change"
                               hx-on::after-request="htmx.ajax('GET', '/partials/engine', {target: '#incident-engine-panel', swap: 'innerHTML', values: {target: this.value}})">
                    </div>
                    
                    <button class="btn-refresh" 
                            hx-get="/partials/metrics" 
                            hx-target="#timeline-body" 
                            hx-include="#target-selector"
                            hx-swap="innerHTML"
                            hx-on::after-request="this.setAttribute('disabled', 'true'); this.innerText = 'WAIT...'; setTimeout(() => { this.removeAttribute('disabled'); this.innerText = 'REFRESH'; }, 3000); htmx.ajax('GET', '/partials/engine', {target: '#incident-engine-panel', swap: 'innerHTML', values: {target: document.getElementById('target-selector').value}})"
                            style="background: #151824; color: #ffffff; border: 1px solid #1e2235; border-radius: 4px; padding: 6px 12px; font-weight: 600; font-size: 11px; cursor: pointer; font-family: inherit;">
                        REFRESH
                    </button>
                </div>
            </header>

            <div class="table-container">
                <div class="table-header-bar">
                    <div class="table-title">Metrics Timeline</div>
                    <div class="text-muted mono" style="font-size: 11px;">40 ENTRIES</div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Target</th>
                            <th>Status</th>
                            <th>Latency</th>
                            <th>Loss</th>
                            <th>Jitter</th>
                        </tr>
                    </thead>
                    <tbody id="timeline-body" 
                           hx-get="/partials/metrics" 
                           hx-trigger="load, every 5s" 
                           hx-include="#target-selector"
                           hx-swap="innerHTML">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 30px; color: #6c757d;">
                                Initializing timeline matrix logs...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="right-panel" 
             id="incident-engine-panel" 
             hx-get="/partials/engine" 
             hx-trigger="load, every 5s" 
             hx-include="#target-selector"
             hx-swap="innerHTML">
            <div style="text-align: center; padding: 20px; color: #6c757d;">
                Syncing analysis logs...
            </div>
        </div>
    </div>
</body>
</html>
